name: customer-support-triage
version: 1.0.0
description: >
  A real-world customer support triage environment where an LLM agent
  classifies tickets, assigns priority, and drafts replies.
tags:
  - openenv
  - customer-support
  - triage
  - nlp
tasks:
  - name: ticket-classify
    level: easy
    description: Classify support ticket into correct category
    grader: tasks.grade_easy
    min_score: 0.01
    max_score: 0.99
  - name: ticket-classify-priority
    level: medium
    description: Classify ticket and assign priority level
    grader: tasks.grade_medium
    min_score: 0.01
    max_score: 0.99
  - name: ticket-full-triage
    level: hard
    description: Classify, prioritize and draft a reply
    grader: tasks.grade_hard
    min_score: 0.01
    max_score: 0.99
action_space:
  - classify(category)
  - set_priority(level)
  - draft_reply(text)
observation_space:
  - ticket_id
  - message
  - category
  - priority
  - reply
  - step
reward_range: [0.01, 0.99]
baseline_scores:
  easy: 0.99
  medium: 0.89
  hard: 0.99
  average: 0.96